name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 9 * * 2'

permissions:
  contents: read
  packages: read
  security-events: write

jobs:
  analyze:
    name: JavaScript and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4
